<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0e23"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="80" height="80" rx="16" fill="url(#bg)"/>

  <!-- Border with gradient -->
  <rect x="0.75" y="0.75" width="78.5" height="78.5" rx="15.5"
        fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>

  <!-- Bracket left -->
  <text x="6" y="50" font-family="'SF Mono','Fira Code','Courier New',monospace"
        font-size="24" fill="#6366f1" font-weight="700" opacity="0.75">&lt;</text>

  <!-- "FA" initials -->
  <text x="22" y="52" font-family="'Helvetica Neue','Arial',sans-serif"
        font-size="26" fill="#f8fafc" font-weight="800" letter-spacing="-1"
        filter="url(#glow)">FA</text>

  <!-- Bracket right -->
  <text x="57" y="50" font-family="'SF Mono','Fira Code','Courier New',monospace"
        font-size="24" fill="#6366f1" font-weight="700" opacity="0.75">/&gt;</text>

  <!-- Underline accent -->
  <rect x="22" y="56" width="38" height="2.5" rx="1.25" fill="url(#accent)"/>
</svg>
